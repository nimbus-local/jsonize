name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Run unit tests
        run: python3 -m unittest tests/test_jsonize.py -v

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches script version
        run: |
          script_version=$(sed -n 's/^VERSION = "\(.*\)"$/\1/p' jsonize)
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$script_version" != "$tag_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match VERSION=$script_version in jsonize" >&2
            exit 1
          fi
          pyproject_version=$(sed -n 's/^version = "\(.*\)"$/\1/p' pyproject.toml)
          if [ "$pyproject_version" != "$tag_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match version=$pyproject_version in pyproject.toml" >&2
            exit 1
          fi
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            jsonize install.sh
